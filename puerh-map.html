<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이차 산지 맵 (普洱茶 産地)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #1a1208;
    color: #e8dcc8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 32px 24px 20px;
    background: linear-gradient(180deg, #0f0a04 0%, transparent 100%);
    border-bottom: 1px solid #3d2e1a;
  }

  header h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #c8a96e;
    letter-spacing: 0.05em;
  }

  header p {
    font-size: 0.85rem;
    color: #8a7558;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .main-layout {
    display: flex;
    height: calc(100vh - 120px);
    gap: 0;
  }

  /* ── MAP PANEL ── */
  .map-panel {
    flex: 1 1 60%;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at 40% 50%, #1e1507 0%, #0d0a05 100%);
  }

  svg.map-svg {
    width: 100%;
    height: 100%;
  }

  /* Province background shape */
  .province-fill {
    fill: #1e1605;
    stroke: #4a3820;
    stroke-width: 1.5;
  }

  /* Region zone blobs */
  .zone-blob {
    opacity: 0.18;
    transition: opacity 0.3s;
  }
  .zone-blob:hover { opacity: 0.3; }

  /* rivers */
  .river {
    fill: none;
    stroke: #2a4a6a;
    stroke-width: 1.2;
    stroke-dasharray: none;
    opacity: 0.6;
  }

  /* location dots */
  .loc-dot {
    cursor: pointer;
    transition: r 0.2s, filter 0.2s;
  }
  .loc-dot:hover {
    filter: brightness(1.5) drop-shadow(0 0 6px currentColor);
  }
  .loc-dot.active {
    filter: brightness(1.8) drop-shadow(0 0 10px currentColor);
  }

  .loc-label {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    fill: #d4b896;
    pointer-events: none;
    dominant-baseline: middle;
  }
  .loc-label.major {
    font-size: 11px;
    font-weight: 500;
    fill: #e8cf9a;
  }

  /* region boundary labels */
  .region-label {
    font-family: 'Noto Serif KR', serif;
    font-size: 12px;
    fill: #8a7050;
    pointer-events: none;
    opacity: 0.8;
  }

  /* compass */
  .compass-text {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    fill: #5a4a38;
  }

  /* ── INFO PANEL ── */
  .info-panel {
    flex: 0 0 380px;
    background: #120e07;
    border-left: 1px solid #2e2210;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .info-default {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px;
    text-align: center;
    opacity: 0.5;
  }

  .info-default .icon { font-size: 3rem; margin-bottom: 16px; }
  .info-default p { font-size: 0.85rem; color: #8a7558; line-height: 1.8; }

  .info-content {
    display: none;
    padding: 28px 24px;
    flex-direction: column;
    gap: 18px;
  }
  .info-content.visible {
    display: flex;
  }

  .info-header {
    border-bottom: 1px solid #2e2210;
    padding-bottom: 16px;
  }

  .info-name-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #c8a96e;
    line-height: 1.2;
  }

  .info-name-zh {
    font-size: 0.85rem;
    color: #7a6548;
    margin-top: 4px;
    font-style: italic;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .badge {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid;
    letter-spacing: 0.02em;
  }

  .badge-region { border-color: #4a3820; color: #8a7050; background: #1e1508; }
  .badge-altitude { border-color: #2a4a2a; color: #7aaa7a; background: #0a180a; }
  .badge-temp { border-color: #4a2a2a; color: #aa7a7a; background: #180a0a; }

  .info-section h3 {
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    color: #7a6040;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .taste-bars {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .taste-bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .taste-bar-label {
    font-size: 0.78rem;
    color: #a09070;
    width: 52px;
    flex-shrink: 0;
    text-align: right;
  }

  .taste-bar-track {
    flex: 1;
    height: 5px;
    background: #1e1808;
    border-radius: 3px;
    overflow: hidden;
  }

  .taste-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .bar-bitter { background: linear-gradient(90deg, #5a3030, #c07060); }
  .bar-astringent { background: linear-gradient(90deg, #3a4a30, #80a060); }
  .bar-sweet { background: linear-gradient(90deg, #4a3a20, #c0a050); }
  .bar-floral { background: linear-gradient(90deg, #3a3050, #9080c0); }
  .bar-smooth { background: linear-gradient(90deg, #2a4050, #6090b0); }
  .bar-huigan { background: linear-gradient(90deg, #3a4a3a, #70a070); }

  .info-desc {
    font-size: 0.83rem;
    color: #b0956a;
    line-height: 1.85;
  }

  .highlight-text {
    background: linear-gradient(90deg, #2a1e0a, #1e1508);
    border-left: 3px solid #c8a96e;
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.82rem;
    color: #c8a06a;
    font-style: italic;
    line-height: 1.7;
  }

  .caution-text {
    background: #1a1010;
    border-left: 3px solid #8a4a40;
    padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    font-size: 0.78rem;
    color: #9a7060;
    line-height: 1.7;
  }

  .caution-text::before {
    content: "⚠ ";
    color: #c06050;
  }

  /* ── LEGEND ── */
  .legend {
    position: absolute;
    bottom: 20px;
    left: 16px;
    background: rgba(10,8,4,0.85);
    border: 1px solid #2e2210;
    border-radius: 8px;
    padding: 12px 14px;
    backdrop-filter: blur(4px);
  }

  .legend h4 {
    font-size: 0.72rem;
    color: #7a6040;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
    cursor: pointer;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-item span {
    font-size: 0.72rem;
    color: #a09070;
  }

  /* ── TABS ── */
  .tab-row {
    display: flex;
    border-bottom: 1px solid #1e1808;
  }

  .tab-btn {
    flex: 1;
    padding: 10px;
    background: none;
    border: none;
    color: #5a4a38;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .tab-btn.active {
    color: #c8a96e;
    border-bottom-color: #c8a96e;
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* scroll bar */
  .info-panel::-webkit-scrollbar { width: 4px; }
  .info-panel::-webkit-scrollbar-track { background: #0a0805; }
  .info-panel::-webkit-scrollbar-thumb { background: #2e2210; border-radius: 2px; }

  /* region type labels on map */
  .map-annotation {
    font-family: 'Noto Serif KR', serif;
    font-size: 9px;
    fill: #3a2e1a;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <h1>보이차 산지 지도 · 普洱茶 産地</h1>
  <p>운남성(雲南省) 주요 차산 — 클릭하여 산지별 특징 확인</p>
</header>

<div class="main-layout">

  <!-- MAP -->
  <div class="map-panel">
    <svg class="map-svg" viewBox="0 0 620 580" xmlns="http://www.w3.org/2000/svg">

      <!-- Province rough outline -->
      <path class="province-fill" d="
        M60,30 L200,20 L280,10 L380,25 L480,50 L560,80 L590,150 L580,240
        L560,300 L540,360 L490,420 L440,480 L380,540 L310,570 L240,560
        L170,530 L110,480 L70,420 L40,350 L30,260 L35,160 L60,30Z
      "/>

      <!-- Country/region border dashes -->
      <path d="M440,480 L480,540 L530,570" fill="none" stroke="#3a2a18" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="490" y="560" class="map-annotation">미얀마</text>
      <text x="555" y="320" class="map-annotation">라오스</text>
      <text x="540" y="430" class="map-annotation" transform="rotate(-20,540,430)">베트남</text>

      <!-- Lancang River (Mekong) -->
      <path class="river" d="M280,30 Q300,80 310,140 Q320,200 330,260 Q340,330 350,390 Q360,440 370,490 Q380,530 390,560"/>
      <text x="355" y="200" class="map-annotation" transform="rotate(20,355,200)">란창강(瀾滄江)</text>

      <!-- Nu River -->
      <path class="river" d="M100,30 Q110,80 115,140 Q118,200 120,260" opacity="0.4"/>

      <!-- Zone blobs -->
      <!-- 보산시 zone -->
      <ellipse class="zone-blob" cx="130" cy="170" rx="100" ry="90" fill="#6a8a6a"/>
      <!-- 임창시 zone -->
      <ellipse class="zone-blob" cx="240" cy="250" rx="100" ry="120" fill="#8a6a4a"/>
      <!-- 보이시 zone -->
      <ellipse class="zone-blob" cx="380" cy="330" rx="110" ry="100" fill="#7a5a8a"/>
      <!-- 서쌍판납 zone -->
      <ellipse class="zone-blob" cx="370" cy="480" rx="130" ry="70" fill="#c8902a"/>

      <!-- REGION BOUNDARY LINES (approximate) -->
      <line x1="200" y1="50" x2="200" y2="380" stroke="#2e2210" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.6"/>
      <line x1="310" y1="140" x2="500" y2="260" stroke="#2e2210" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.6"/>
      <line x1="200" y1="380" x2="500" y2="400" stroke="#2e2210" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.6"/>

      <!-- Region name labels -->
      <text x="80" y="140" class="region-label" opacity="0.5">보산시</text>
      <text x="80" y="154" class="region-label" opacity="0.4" font-size="10">保山市</text>
      <text x="210" y="195" class="region-label" opacity="0.5">임창시</text>
      <text x="210" y="209" class="region-label" opacity="0.4" font-size="10">臨滄市</text>
      <text x="410" y="310" class="region-label" opacity="0.5">보이시</text>
      <text x="410" y="324" class="region-label" opacity="0.4" font-size="10">普洱市</text>
      <text x="280" y="470" class="region-label" opacity="0.5">서쌍판납</text>
      <text x="278" y="484" class="region-label" opacity="0.4" font-size="10">西雙版納</text>

      <!-- ═══════════════════════════════
           LOCATION DOTS & LABELS
           ═══════════════════════════════ -->

      <!-- 1. 보산시 - major dot -->
      <circle id="dot-baoshan" class="loc-dot" cx="120" cy="175" r="8"
        fill="#6a8a6a" stroke="#a0c4a0" stroke-width="1.5"
        onclick="showInfo('baoshan')" />
      <text x="133" y="175" class="loc-label major">보산시</text>

      <!-- 2. 임창시 - major dot -->
      <circle id="dot-lincang" class="loc-dot" cx="230" cy="255" r="8"
        fill="#8a6a4a" stroke="#c4a070" stroke-width="1.5"
        onclick="showInfo('lincang')" />
      <text x="243" y="255" class="loc-label major">임창시</text>

      <!-- 3. 빙도 (冰島) - star -->
      <polygon id="dot-bingdao" class="loc-dot"
        points="220,180 224,190 235,190 227,196 230,207 220,201 210,207 213,196 205,190 216,190"
        fill="#d4c060" stroke="#f0e080" stroke-width="1"
        onclick="showInfo('bingdao')" />
      <text x="238" y="193" class="loc-label" style="fill:#f0d860;font-weight:500;">빙도</text>

      <!-- 4. 보이시 - major dot -->
      <circle id="dot-puer" class="loc-dot" cx="430" cy="330" r="8"
        fill="#7a5a8a" stroke="#c090d0" stroke-width="1.5"
        onclick="showInfo('puer')" />
      <text x="443" y="330" class="loc-label major">보이시</text>

      <!-- 5. 서쌍판납 - major dot -->
      <circle id="dot-xishuang" class="loc-dot" cx="310" cy="465" r="9"
        fill="#c8902a" stroke="#e8b040" stroke-width="1.5"
        onclick="showInfo('xishuang')" />
      <text x="325" y="465" class="loc-label major">서쌍판납</text>

      <!-- === 맹납현 (육대차산) === -->
      <!-- 6. 이무 -->
      <circle id="dot-yiwu" class="loc-dot" cx="455" cy="460" r="6"
        fill="#c8902a" stroke="#e8b850" stroke-width="1.2"
        onclick="showInfo('yiwu')" />
      <text x="463" y="460" class="loc-label">이무 易武</text>

      <!-- 7. 의방 -->
      <circle id="dot-yibang" class="loc-dot" cx="440" cy="430" r="5"
        fill="#b87828" stroke="#d8a040" stroke-width="1"
        onclick="showInfo('yibang')" />
      <text x="448" y="430" class="loc-label">의방 倚邦</text>

      <!-- 8. 만전 -->
      <circle id="dot-manzhuang" class="loc-dot" cx="462" cy="445" r="5"
        fill="#b87828" stroke="#d8a040" stroke-width="1"
        onclick="showInfo('manzhuang')" />
      <text x="470" y="450" class="loc-label">만전 蠻磚</text>

      <!-- 9. 혁등 -->
      <circle id="dot-gedeng" class="loc-dot" cx="445" cy="418" r="4.5"
        fill="#a07030" stroke="#c89050" stroke-width="1"
        onclick="showInfo('gedeng')" />
      <text x="452" y="418" class="loc-label">혁등 革登</text>

      <!-- 10. 망지 -->
      <circle id="dot-mangzhi" class="loc-dot" cx="432" cy="407" r="4.5"
        fill="#a07030" stroke="#c89050" stroke-width="1"
        onclick="showInfo('mangzhi')" />
      <text x="439" y="407" class="loc-label">망지 莽枝</text>

      <!-- 11. 유락(기낙산) -->
      <circle id="dot-yuluo" class="loc-dot" cx="355" cy="450" r="5"
        fill="#a07030" stroke="#c89050" stroke-width="1"
        onclick="showInfo('yuluo')" />
      <text x="362" y="445" class="loc-label">유락 攸樂</text>

      <!-- === 맹해현 차산 === -->
      <!-- 12. 포랑산 (노반장) -->
      <polygon id="dot-bulang" class="loc-dot"
        points="285,500 290,512 303,512 293,519 297,531 285,524 273,531 277,519 267,512 280,512"
        fill="#c04030" stroke="#e06050" stroke-width="1"
        onclick="showInfo('bulang')" />
      <text x="307" y="515" class="loc-label" style="fill:#e06050;font-weight:500;">포랑산·반장</text>

      <!-- 13. 남나산 -->
      <circle id="dot-nannuo" class="loc-dot" cx="350" cy="478" r="5"
        fill="#c8902a" stroke="#e8b040" stroke-width="1"
        onclick="showInfo('nannuo')" />
      <text x="357" y="474" class="loc-label">남나산 南糯山</text>

      <!-- 14. 파사 -->
      <circle id="dot-pasha" class="loc-dot" cx="303" cy="490" r="5"
        fill="#a07030" stroke="#c89050" stroke-width="1"
        onclick="showInfo('pasha')" />
      <text x="310" y="486" class="loc-label">파사 帕沙</text>

      <!-- 15. 하개 -->
      <circle id="dot-hekai" class="loc-dot" cx="330" cy="490" r="5"
        fill="#a07030" stroke="#c89050" stroke-width="1"
        onclick="showInfo('hekai')" />
      <text x="337" y="490" class="loc-label">하개 賀開</text>

      <!-- ─── 3대 차구 표시선 (subtle) ─── -->
      <text x="135" y="400" class="map-annotation" opacity="0.6">하관차구</text>
      <text x="255" y="530" class="map-annotation" opacity="0.6">맹해차구</text>
      <text x="430" y="395" class="map-annotation" opacity="0.6">이무차구</text>

      <!-- 나침반 -->
      <g transform="translate(560,55)">
        <circle cx="0" cy="0" r="18" fill="#0a0805" stroke="#2e2210" stroke-width="1"/>
        <polygon points="0,-14 -4,0 0,-5 4,0" fill="#c8a96e"/>
        <polygon points="0,14 -4,0 0,5 4,0" fill="#3a2e1a"/>
        <text x="0" y="-17" class="compass-text" text-anchor="middle" font-size="8">N</text>
      </g>

      <!-- scale bar -->
      <g transform="translate(50, 545)">
        <line x1="0" y1="0" x2="80" y2="0" stroke="#3a2e1a" stroke-width="1.5"/>
        <line x1="0" y1="-4" x2="0" y2="4" stroke="#3a2e1a" stroke-width="1.5"/>
        <line x1="80" y1="-4" x2="80" y2="4" stroke="#3a2e1a" stroke-width="1.5"/>
        <text x="40" y="14" class="compass-text" text-anchor="middle">약 100km</text>
      </g>

    </svg>

    <!-- Legend -->
    <div class="legend">
      <h4>산지 유형</h4>
      <div class="legend-item" onclick="showInfo('xishuang')">
        <div class="legend-dot" style="background:#c8902a;"></div>
        <span>서쌍판납 주요 산지</span>
      </div>
      <div class="legend-item" onclick="showInfo('bulang')">
        <div class="legend-dot" style="background:#c04030;border-radius:2px;transform:rotate(45deg);"></div>
        <span>주요 명산지 (★)</span>
      </div>
      <div class="legend-item" onclick="showInfo('bingdao')">
        <div class="legend-dot" style="background:#d4c060;clip-path:polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);"></div>
        <span>최고급 단일 산지</span>
      </div>
      <div class="legend-item" onclick="showInfo('baoshan')">
        <div class="legend-dot" style="background:#6a8a6a;"></div>
        <span>4대 산지 (대분류)</span>
      </div>
    </div>
  </div>

  <!-- INFO PANEL -->
  <div class="info-panel" id="infoPanel">

    <div class="info-default" id="infoDefault">
      <div class="icon">🍵</div>
      <p>지도의 산지를 클릭하면<br>맛, 향, 특징, 주의사항을<br>확인할 수 있습니다.</p>
    </div>

    <div class="info-content" id="infoContent">
      <div class="info-header">
        <div class="info-name-ko" id="infoNameKo"></div>
        <div class="info-name-zh" id="infoNameZh"></div>
        <div class="badge-row" id="infoBadges"></div>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('taste')">맛과 향</button>
        <button class="tab-btn" onclick="switchTab('profile')">산지 특징</button>
        <button class="tab-btn" onclick="switchTab('note')">구매 팁</button>
      </div>

      <div class="tab-content active" id="tab-taste">
        <div style="padding: 16px 0;">
          <div class="info-section">
            <h3>맛 프로파일</h3>
            <div class="taste-bars" id="tasteBars"></div>
          </div>
          <div style="margin-top:16px;">
            <div class="highlight-text" id="tasteHighlight"></div>
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-profile">
        <div style="padding: 16px 0;">
          <p class="info-desc" id="profileDesc"></p>
        </div>
      </div>

      <div class="tab-content" id="tab-note">
        <div style="padding: 16px 0;">
          <div class="caution-text" id="cautionText"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const DATA = {

  baoshan: {
    ko: '보산시',
    zh: '保山市',
    badges: ['4대 산지', '고해발', '저온'],

let currentRegion = null;
let currentTab = 'taste';

function showInfo(id) {
  const d = DATA[id];
  if (!d) return;

  currentRegion = id;

  // Remove active from all dots
  document.querySelectorAll('.loc-dot').forEach(el => el.classList.remove('active'));

  // Add active to clicked dot
  const dot = document.getElementById('dot-' + id);
  if (dot) dot.classList.add('active');

  document.getElementById('infoDefault').style.display = 'none';
  const content = document.getElementById('infoContent');
  content.classList.add('visible');

  document.getElementById('infoNameKo').textContent = d.ko;
  document.getElementById('infoNameZh').textContent = d.zh;

  const badgeRow = document.getElementById('infoBadges');
  badgeRow.innerHTML = '';
  d.badges.forEach((b, i) => {
    const span = document.createElement('span');
    span.className = 'badge badge-' + (d.badgeTypes[i] || 'region');
    span.textContent = b;
    badgeRow.appendChild(span);
  });

  renderTaste(d);
  document.getElementById('tasteHighlight').textContent = d.highlight;
  document.getElementById('profileDesc').textContent = d.profile;
  document.getElementById('cautionText').textContent = d.caution;

  // reset to taste tab
  switchTab('taste');
}

function renderTaste(d) {
  const bars = document.getElementById('tasteBars');
  bars.innerHTML = '';
  const labels = { 쓴맛: 'bar-bitter', 떫은맛: 'bar-astringent', 단맛: 'bar-sweet', 꽃향: 'bar-floral', 탕질부드러움: 'bar-smooth', 회감: 'bar-huigan' };
  const displayNames = { 쓴맛: '쓴맛', 떫은맛: '떫은맛', 단맛: '단맛', 꽃향: '꽃향·청향', 탕질부드러움: '탕질', 회감: '회감' };
  Object.entries(d.taste).forEach(([key, val]) => {
    const row = document.createElement('div');
    row.className = 'taste-bar-row';
    row.innerHTML = `
      <span class="taste-bar-label">${displayNames[key]}</span>
      <div class="taste-bar-track">
        <div class="taste-bar-fill ${labels[key]}" style="width: 0%"></div>
      </div>
    `;
    bars.appendChild(row);
    // Animate
    setTimeout(() => {
      row.querySelector('.taste-bar-fill').style.width = val + '%';
    }, 50);
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['taste', 'profile', 'note'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.toggle('active', el.id === 'tab-' + tab);
  });
}
</script>
